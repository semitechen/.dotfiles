# --- Appearance & Theme ---
include current-theme.conf

background_image ~/.wallpapers/testbg.png
background_image_layout scaled
background_tint 0.0

# Window Decorations
hide_window_decorations yes
window_padding_width 0
resize_draw_strategy static

# --- Typography ---
font_size 14.0
disable_ligatures always

# --- Mouse & Cursor ---
mouse_hide_wait -1.0
cursor_blink_interval 0

# --- Behavior & Scrollback ---
scrollback_lines 10000

# --- Tmux Integration (Hiding Kitty UI to let Tmux handle it) ---
enabled_layouts grid,stack
tab_bar_style hidden
tab_bar_min_tabs 1

# --- Keyboard Pass-through (Send tmux commands via prefix C-b) ---
map shift+enter send_text all \x1b[13;2u
map cmd+t send_text all \x02c
map cmd+w send_text all \x02&
map cmd+d send_text all \x02d
map cmd+[ send_text all \x02p
map cmd+] send_text all \x02n

# Switch to windows 0-9
map cmd+0 send_text all \x020
map cmd+1 send_text all \x021
map cmd+2 send_text all \x022
map cmd+3 send_text all \x023
map cmd+4 send_text all \x024
map cmd+5 send_text all \x025
map cmd+6 send_text all \x026
map cmd+7 send_text all \x027
map cmd+8 send_text all \x028
map cmd+9 send_text all \x029

# --- macOS Specific ---
macos_option_as_alt yes
# Note: macos-icon is not supported via kitty.conf
